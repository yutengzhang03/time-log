<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 移动端竖屏适配：viewport-fit=cover 兼容刘海屏；user-scalable=no 防止误触缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>时间日志</title>

  <!-- ===== iOS「添加到主屏幕」相关：让网页像 App 一样运行 =====
       1. 全屏运行（隐藏 Safari 地址栏与底部栏）
       2. 状态栏样式
       3. 主屏图标显示的 App 名
       4. 主屏图标（内嵌 SVG，无需额外文件） -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="时间日志" />
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%232563eb'/><text x='90' y='118' font-size='90' text-anchor='middle' fill='white' font-family='-apple-system,PingFang SC,sans-serif' font-weight='600'>时</text></svg>" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%232563eb'/><text x='90' y='118' font-size='90' text-anchor='middle' fill='white' font-family='-apple-system,sans-serif' font-weight='600'>时</text></svg>" />
  <style>
    /* =============================================================
       极简清爽风格：大字号、高对比度、留白多、按钮大、避免花哨色彩
       老年人友好：字号≥16px，按钮高度≥44px，颜色对比≥4.5:1
       ============================================================= */

    /* CSS 变量统一管理颜色与尺寸，方便后续修改 */
    :root {
      --color-bg: #f7f7f8;          /* 整体背景 */
      --color-card: #ffffff;        /* 卡片背景 */
      --color-text: #1a1a1a;        /* 主文字 */
      --color-text-soft: #666666;   /* 次要文字 */
      --color-border: #e5e5e7;      /* 边框/分割线 */
      --color-primary: #2563eb;     /* 主操作蓝 */
      --color-primary-soft: #e8f0fe;/* 主操作浅底 */
      --color-danger: #dc2626;      /* 删除红 */
      --color-success: #16a34a;     /* 成功绿 */
      --radius: 12px;               /* 圆角 */
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --tab-h: 64px;                /* 底部标签栏高度 */
      --header-h: 56px;             /* 顶部标题栏高度 */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* 移动端容器：竖屏最大宽度 480px，桌面预览时居中显示
       iPhone PWA 全屏时，需要避开底部 Home 指示条与顶部刘海/灵动岛 */
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--color-bg);
      position: relative;
      padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom, 0px));
      padding-top: env(safe-area-inset-top, 0px);
    }

    /* ---------- 顶部标题栏 ---------- */
    .header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--color-card);
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .header-action {
      color: var(--color-primary);
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }

    /* ---------- 页面容器 ---------- */
    .page { padding: 16px; display: none; }
    .page.active { display: block; }

    /* ---------- 通用卡片 ---------- */
    .card {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--color-text);
    }

    /* ---------- 表单元素 ---------- */
    label {
      display: block;
      font-size: 14px;
      color: var(--color-text-soft);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="time"],
    input[type="date"],
    select {
      width: 100%;
      height: 48px;          /* 老年人友好：触摸目标≥44px */
      padding: 0 12px;
      font-size: 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: #fff;
      color: var(--color-text);
      -webkit-appearance: none;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--color-primary);
    }
    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .form-row > div { flex: 1; }
    .form-field { margin-bottom: 12px; }

    /* ---------- 按钮 ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 48px;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-secondary {
      background: var(--color-primary-soft);
      color: var(--color-primary);
    }
    .btn-danger { background: var(--color-danger); color: #fff; }
    .btn-ghost {
      background: transparent;
      color: var(--color-text-soft);
      border: 1px solid var(--color-border);
    }
    .btn-sm { height: 36px; font-size: 14px; width: auto; padding: 0 14px; }

    /* ---------- 记录条目 ---------- */
    .record-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .record-item:last-child { border-bottom: none; }
    .record-time {
      width: 110px;
      font-size: 14px;
      color: var(--color-text-soft);
      font-variant-numeric: tabular-nums;
    }
    .record-main { flex: 1; min-width: 0; }
    .record-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .record-tag {
      display: inline-block;
      font-size: 12px;
      color: var(--color-primary);
      background: var(--color-primary-soft);
      padding: 2px 8px;
      border-radius: 6px;
    }
    .record-actions {
      display: flex;
      gap: 6px;
      margin-left: 8px;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--color-text-soft);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover { color: var(--color-primary); }
    .icon-btn.danger:hover { color: var(--color-danger); }

    /* ---------- 空态 ---------- */
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--color-text-soft);
      font-size: 14px;
    }

    /* ---------- 统计：标签条 ---------- */
    .stat-item { padding: 10px 0; border-bottom: 1px solid var(--color-border); }
    .stat-item:last-child { border-bottom: none; }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .stat-name { font-size: 15px; font-weight: 500; }
    .stat-meta { font-size: 13px; color: var(--color-text-soft); font-variant-numeric: tabular-nums; }
    .stat-bar {
      height: 6px;
      background: var(--color-border);
      border-radius: 3px;
      overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* ---------- 标签管理 ---------- */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      font-size: 14px;
      background: var(--color-primary-soft);
      color: var(--color-primary);
      border-radius: 20px;
    }
    .tag-chip .remove {
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      opacity: 0.7;
    }
    .tag-chip .remove:hover { opacity: 1; }

    /* ---------- 底部标签栏 ---------- */
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 480px;
      margin: 0 auto;
      height: calc(var(--tab-h) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--color-card);
      border-top: 1px solid var(--color-border);
      display: flex;
      z-index: 10;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border: none;
      background: transparent;
      color: var(--color-text-soft);
      font-size: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn .icon { font-size: 22px; line-height: 1; }
    .tab-btn.active { color: var(--color-primary); }

    /* ---------- 模态框 ---------- */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    .modal-mask.active { display: flex; }
    .modal {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: var(--radius);
      padding: 20px;
    }
    .modal h3 { font-size: 18px; margin-bottom: 16px; }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .modal-actions .btn { flex: 1; }

    /* ---------- 选择日期/筛选条 ---------- */
    .date-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .date-bar input[type="date"] { flex: 1; }

    /* 周统计：日期范围说明 */
    .range-hint { font-size: 13px; color: var(--color-text-soft); margin-bottom: 8px; }

    /* 总耗时高亮 */
    .total {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid var(--color-border);
      margin-top: 8px;
      font-weight: 600;
    }

    /* 时间轴样式（历史页） */
    .timeline-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-time {
      width: 100px;
      font-size: 13px;
      color: var(--color-text-soft);
      font-variant-numeric: tabular-nums;
      padding-top: 2px;
    }
    .timeline-content { flex: 1; min-width: 0; }
    .timeline-content .title { font-size: 15px; font-weight: 500; margin-bottom: 2px; }

    /* ---------- 历史页：紧凑文本式列表（截图友好） ----------
       关键设计：
       - 默认（编辑模式 OFF）：根本不渲染操作按钮，行高最小
       - 编辑模式 ON：按钮内联在同一行右侧，不换行、不影响行高
       - 永远不依赖 hover，避免布局抖动 */
    .compact-list {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 14px;
      line-height: 1.6;
      color: var(--color-text);
    }
    .compact-row {
      display: grid;
      grid-template-columns: 105px 1fr auto;
      gap: 8px;
      padding: 1px 0;
      align-items: center;
    }
    .compact-row .t { color: var(--color-text-soft); font-variant-numeric: tabular-nums; }
    .compact-row .n { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .compact-row .n .tagref { color: var(--color-primary); font-size: 12px; margin-left: 4px; }
    /* 第三列：时长 + （可选）操作按钮，并排不换行 */
    .compact-row .r {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .compact-row .r .ops {
      display: inline-flex;
      gap: 2px;
    }
    .compact-row .r .ops button {
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      color: var(--color-text-soft);
    }
    .compact-row .r .ops button:hover { color: var(--color-primary); }
    .compact-row .r .ops button.danger:hover { color: var(--color-danger); }

    .compact-summary {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--color-border);
      font-size: 13px;
      color: var(--color-text-soft);
      display: flex;
      justify-content: space-between;
    }

    /* 历史页工具条：紧凑模式开关 / 显示操作按钮开关 */
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--color-text-soft);
    }
    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin: 0;
      cursor: pointer;
    }

    /* ---------- 标签管理增强：行布局 + 排序按钮 ---------- */
    .tag-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .tag-row:last-child { border-bottom: none; }
    .tag-row .name {
      flex: 1;
      font-size: 16px;
      color: var(--color-text);
      padding: 4px 10px;
      background: var(--color-primary-soft);
      color: var(--color-primary);
      border-radius: 16px;
      display: inline-block;
      max-width: max-content;
    }
    .tag-row .ops { display: flex; gap: 4px; }
    .tag-row .ops button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--color-border);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      color: var(--color-text-soft);
    }
    .tag-row .ops button:disabled { opacity: 0.35; cursor: not-allowed; }
    .tag-row .ops button.danger { color: var(--color-danger); }

    /* ---------- 通用：分段开关（segmented control） ---------- */
    .segmented {
      display: inline-flex;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .segmented button {
      border: none;
      background: transparent;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--color-text-soft);
      cursor: pointer;
    }
    .segmented button.active {
      background: var(--color-primary);
      color: #fff;
    }
    .segmented-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--color-text-soft);
    }

    /* ---------- 统计页：日期 / 周 导航条 ---------- */
    .stats-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stats-nav button.nav-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--color-border);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      color: var(--color-text);
      flex: 0 0 auto;
    }
    .stats-nav button.nav-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .stats-nav .label {
      flex: 1;
      text-align: center;
      font-size: 14px;
      color: var(--color-text);
      font-variant-numeric: tabular-nums;
    }
    .stats-nav .label .sub {
      display: block;
      font-size: 12px;
      color: var(--color-text-soft);
      margin-top: 1px;
    }
    .stats-nav .reset {
      flex: 0 0 auto;
      font-size: 13px;
      color: var(--color-primary);
      background: var(--color-primary-soft);
      border: none;
      padding: 0 10px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
    }
    .stats-nav .reset:disabled { opacity: 0.4; cursor: default; }

    /* ---------- 数据导入导出区 ---------- */
    .data-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .data-actions .btn { flex: 1; }
    .file-hidden { display: none; }

    /* 提示条 */
    .toast {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="app">
    <!-- 顶部标题栏：根据当前页变化 -->
    <header class="header">
      <h1 id="pageTitle">今日记录</h1>
      <span id="headerAction" class="header-action" style="display:none">操作</span>
    </header>

    <!-- ============ 1. 记录页（主页） ============ -->
    <section id="page-record" class="page active">
      <!-- 添加新记录的表单 -->
      <div class="card">
        <h2>添加一条记录</h2>
        <div class="form-field">
          <label for="inputDate">日期（默认今天，可选过去任意一天补录）</label>
          <input type="date" id="inputDate" />
        </div>
        <div class="form-row">
          <div>
            <label for="inputStart">开始时间</label>
            <input type="time" id="inputStart" />
          </div>
          <div>
            <label for="inputEnd">结束时间</label>
            <input type="time" id="inputEnd" />
          </div>
        </div>
        <div class="form-field">
          <label for="inputEvent">事件名称</label>
          <input type="text" id="inputEvent" placeholder="例如：午睡、看书、打游戏" maxlength="40" />
        </div>
        <div class="form-field">
          <label for="inputTag">分类标签</label>
          <select id="inputTag"></select>
        </div>
        <button class="btn btn-primary" id="btnAdd">保存记录</button>
      </div>

      <!-- 今天已经记录的列表 -->
      <div class="card">
        <h2 id="todayTitle">今天的记录</h2>
        <div id="todayList"></div>
      </div>
    </section>

    <!-- ============ 2. 统计页 ============ -->
    <section id="page-stats" class="page">
      <!-- 单日统计：可任意切换日期 -->
      <div class="card">
        <h2 id="dailyTitle">每日汇总</h2>
        <div class="stats-nav">
          <button class="nav-btn" id="dayPrev" title="前一天">‹</button>
          <div class="label">
            <span id="dayLabel"></span>
            <span class="sub" id="daySub"></span>
          </div>
          <button class="nav-btn" id="dayNext" title="后一天">›</button>
          <button class="reset" id="dayToday">今天</button>
        </div>
        <div id="dailyStats"></div>
      </div>

      <!-- 周统计：可任意切换周次 -->
      <div class="card">
        <h2 id="weeklyTitle">每周汇总</h2>
        <div class="stats-nav">
          <button class="nav-btn" id="weekPrev" title="上一周">‹</button>
          <div class="label">
            <span id="weekLabel"></span>
            <span class="sub" id="weekSub"></span>
          </div>
          <button class="nav-btn" id="weekNext" title="下一周">›</button>
          <button class="reset" id="weekThis">本周</button>
        </div>
        <!-- 显示模式切换：总时长 / 每日平均 -->
        <div class="segmented-row">
          <span>显示：</span>
          <div class="segmented" id="weekMode">
            <button data-mode="total" class="active">总时长</button>
            <button data-mode="avg">每日平均</button>
          </div>
        </div>
        <div id="weeklyStats"></div>
      </div>
    </section>

    <!-- ============ 3. 历史页 ============ -->
    <section id="page-history" class="page">
      <div class="card">
        <h2>选择日期</h2>
        <div class="date-bar">
          <input type="date" id="historyDate" />
          <button class="btn btn-secondary btn-sm" id="btnToday">回到今天</button>
        </div>
        <div class="toolbar">
          <label><input type="checkbox" id="chkShowEvent" checked /> 事件名称</label>
          <label><input type="checkbox" id="chkShowTag"   checked /> 分类标签</label>
          <label><input type="checkbox" id="chkShowOps" /> 编辑模式</label>
        </div>
        <div id="historyTimeline"></div>
      </div>
    </section>

    <!-- ============ 4. 标签管理页 ============ -->
    <section id="page-tags" class="page">
      <div class="card">
        <h2>我的标签（点 ↑ ↓ 调整顺序）</h2>
        <div id="tagList"></div>
        <div class="form-row" style="margin-top:12px">
          <div>
            <input type="text" id="newTagInput" placeholder="输入新标签名" maxlength="10" />
          </div>
          <div style="flex:0 0 auto">
            <button class="btn btn-secondary btn-sm" id="btnAddTag" style="height:48px;padding:0 16px">添加</button>
          </div>
        </div>
        <p style="font-size:13px;color:var(--color-text-soft);margin-top:8px">
          提示：删除标签不会删除已有记录，记录会保留原标签名。
        </p>
      </div>

      <!-- 数据导入导出（备份） -->
      <div class="card">
        <h2>数据备份</h2>
        <p style="font-size:13px;color:var(--color-text-soft);margin-bottom:8px">
          导出会下载一个 JSON 文件（包含全部记录与标签），可保存到任意位置；导入会用文件内容覆盖当前数据。
        </p>
        <div class="data-actions">
          <button class="btn btn-secondary" id="btnExport">导出 JSON</button>
          <button class="btn btn-ghost" id="btnImport">导入 JSON</button>
        </div>
        <input type="file" id="fileImport" accept="application/json,.json" class="file-hidden" />
      </div>
    </section>

    <!-- ============ 底部 Tab Bar ============ -->
    <nav class="tabbar">
      <button class="tab-btn active" data-page="record">
        <span class="icon">＋</span><span>记录</span>
      </button>
      <button class="tab-btn" data-page="stats">
        <span class="icon">📊</span><span>统计</span>
      </button>
      <button class="tab-btn" data-page="history">
        <span class="icon">📅</span><span>历史</span>
      </button>
      <button class="tab-btn" data-page="tags">
        <span class="icon">🏷</span><span>标签</span>
      </button>
    </nav>

    <!-- ============ 编辑记录的模态框 ============ -->
    <div class="modal-mask" id="editModal">
      <div class="modal">
        <h3>编辑记录</h3>
        <div class="form-field">
          <label>日期</label>
          <input type="date" id="editDate" />
        </div>
        <div class="form-row">
          <div>
            <label>开始时间</label>
            <input type="time" id="editStart" />
          </div>
          <div>
            <label>结束时间</label>
            <input type="time" id="editEnd" />
          </div>
        </div>
        <div class="form-field">
          <label>事件名称</label>
          <input type="text" id="editEvent" maxlength="40" />
        </div>
        <div class="form-field">
          <label>分类标签</label>
          <select id="editTag"></select>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="btnEditCancel">取消</button>
          <button class="btn btn-primary" id="btnEditSave">保存</button>
        </div>
      </div>
    </div>

    <!-- 简易 Toast 提示 -->
    <div class="toast" id="toast"></div>
  </div>

  <script>
    /* =====================================================================
       数据层：使用 localStorage 进行持久化存储
       数据结构：
       - records: Array<{ id, date: 'YYYY-MM-DD', start: 'HH:mm', end: 'HH:mm', event, tag }>
       - tags:    Array<string>
       ===================================================================== */
    const STORAGE_KEY_RECORDS = 'tl_records_v1';
    const STORAGE_KEY_TAGS = 'tl_tags_v1';

    // 默认标签：首次使用时初始化
    const DEFAULT_TAGS = ['睡眠', '工作', '学习', '吃饭', '运动', '游戏', '休闲', '其他'];

    // ---------- 通用工具函数 ----------
    /** 生成简短唯一 id */
    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    /** 把 Date 对象格式化为 'YYYY-MM-DD' */
    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    /** 把 Date 对象格式化为 'HH:mm' */
    function fmtTime(d) {
      return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    /** 将 'HH:mm' 时间字符串转换为分钟数 (0-1440) */
    function timeToMin(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    /** 把分钟数格式化为 "X 小时 Y 分" / "Y 分钟" */
    function fmtDuration(min) {
      if (min <= 0) return '0 分钟';
      const h = Math.floor(min / 60);
      const m = min % 60;
      if (h === 0) return `${m} 分钟`;
      if (m === 0) return `${h} 小时`;
      return `${h} 小时 ${m} 分`;
    }

    /** 计算单条记录的耗时（分钟）；支持跨天（end 小于 start 视为次日） */
    function durationOf(rec) {
      const s = timeToMin(rec.start);
      let e = timeToMin(rec.end);
      if (e < s) e += 24 * 60; // 跨午夜
      return e - s;
    }

    /** 给定任意 Date，返回该周（周一~周日）的 [起始 Date, 结束 Date] */
    function getWeekRange(date) {
      const d = new Date(date);
      const day = d.getDay(); // 0=周日, 1=周一, ...
      // 我们以"周一"为一周开始
      const diffToMonday = day === 0 ? 6 : day - 1;
      const start = new Date(d);
      start.setDate(d.getDate() - diffToMonday);
      start.setHours(0, 0, 0, 0);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      end.setHours(23, 59, 59, 999);
      return [start, end];
    }

    // ---------- 数据读写 ----------
    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_RECORDS);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        console.error('读取记录失败', e);
        return [];
      }
    }
    function saveRecords(arr) {
      localStorage.setItem(STORAGE_KEY_RECORDS, JSON.stringify(arr));
    }
    function loadTags() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_TAGS);
        if (!raw) {
          // 首次：写入默认标签
          localStorage.setItem(STORAGE_KEY_TAGS, JSON.stringify(DEFAULT_TAGS));
          return [...DEFAULT_TAGS];
        }
        return JSON.parse(raw);
      } catch (e) {
        return [...DEFAULT_TAGS];
      }
    }
    function saveTags(arr) {
      localStorage.setItem(STORAGE_KEY_TAGS, JSON.stringify(arr));
    }

    // ---------- 应用状态 ----------
    // 计算"本周"周一作为默认 statsWeekStart
    function getMondayStr(date) {
      const [s] = getWeekRange(date);
      return fmtDate(s);
    }
    let state = {
      records: loadRecords(),
      tags: loadTags(),
      currentPage: 'record',
      historyDate: fmtDate(new Date()),
      editingId: null,
      // 历史页：是否在每行尾部内联渲染编辑/删除按钮
      showHistoryOps: false,
      // 历史页：是否显示事件名称、分类标签（用于截图时简化）
      showEvent: true,
      showTag: true,
      // 统计页：当前查看的"日"与"周（周一日期）"
      statsDate: fmtDate(new Date()),
      statsWeekStart: getMondayStr(new Date()),
      // 周汇总显示模式：'total' = 总时长，'avg' = 每日平均
      weeklyMode: 'total',
    };

    // ---------- Toast 简易提示 ----------
    let toastTimer = null;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
    }

    // ---------- 渲染：标签下拉框 ----------
    function renderTagSelect(selectEl, selectedValue) {
      selectEl.innerHTML = '';
      state.tags.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        if (t === selectedValue) opt.selected = true;
        selectEl.appendChild(opt);
      });
      // 如果选中的值已不在标签列表中（比如标签被删除了），也作为 option 保留
      if (selectedValue && !state.tags.includes(selectedValue)) {
        const opt = document.createElement('option');
        opt.value = selectedValue;
        opt.textContent = selectedValue + '（已删除）';
        opt.selected = true;
        selectEl.appendChild(opt);
      }
    }

    // ---------- 渲染：今天的记录 ----------
    function renderTodayList() {
      const today = fmtDate(new Date());
      const list = state.records
        .filter(r => r.date === today)
        .sort((a, b) => timeToMin(a.start) - timeToMin(b.start));

      document.getElementById('todayTitle').textContent =
        `今天的记录（${list.length} 条）`;

      const container = document.getElementById('todayList');
      if (list.length === 0) {
        container.innerHTML = '<div class="empty">还没有记录，添加第一条吧 ✏️</div>';
        return;
      }
      container.innerHTML = list.map(r => recordItemHTML(r)).join('');
      bindRecordItemEvents(container);
    }

    /** 单条记录的 HTML（用于"今日"和"历史"时间轴） */
    function recordItemHTML(r) {
      return `
        <div class="record-item" data-id="${r.id}">
          <div class="record-time">${r.start} – ${r.end}</div>
          <div class="record-main">
            <div class="record-title">${escapeHTML(r.event)}</div>
            <span class="record-tag">${escapeHTML(r.tag)}</span>
            <span class="stat-meta" style="margin-left:6px">${fmtDuration(durationOf(r))}</span>
          </div>
          <div class="record-actions">
            <button class="icon-btn" data-action="edit" title="编辑">✎</button>
            <button class="icon-btn danger" data-action="delete" title="删除">🗑</button>
          </div>
        </div>
      `;
    }

    /** 防 XSS：转义 HTML 特殊字符 */
    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[ch]);
    }

    /** 给容器内所有记录卡片绑定 编辑/删除 事件 */
    function bindRecordItemEvents(container) {
      container.querySelectorAll('.record-item').forEach(el => {
        const id = el.dataset.id;
        el.querySelector('[data-action="edit"]').onclick = () => openEditModal(id);
        el.querySelector('[data-action="delete"]').onclick = () => {
          if (confirm('确定要删除这条记录吗？')) {
            state.records = state.records.filter(r => r.id !== id);
            saveRecords(state.records);
            refreshAll();
            toast('已删除');
          }
        };
      });
    }

    /**
     * 给定一组记录，渲染按标签聚合的统计（条目+进度条+总计）
     * @param {HTMLElement} container - 渲染目标容器
     * @param {Array} records - 已经过滤好的记录数组
     * @param {string} totalLabel - 总计行的左侧文案
     * @param {string} emptyText  - 没有记录时的提示
     * @param {Object} [opts]
     * @param {number} [opts.divisor]  - 分母（如周平均传 7）；默认 1（即总时长）
     * @param {string} [opts.unitText] - 单位说明，例如 "/天"，附在各标签时长后
     */
    function renderStatsInto(container, records, totalLabel, emptyText, opts) {
      const divisor = (opts && opts.divisor) ? opts.divisor : 1;
      const unitText = (opts && opts.unitText) ? opts.unitText : '';
      if (records.length === 0) {
        container.innerHTML = `<div class="empty">${emptyText}</div>`;
        return;
      }
      // 按标签聚合（分钟）
      const map = {};
      let total = 0;
      records.forEach(r => {
        const d = durationOf(r);
        map[r.tag] = (map[r.tag] || 0) + d;
        total += d;
      });
      // 占比仍按"总时长"计算（占比是不变的），显示数值再做除法
      const items = Object.entries(map)
        .sort((a, b) => b[1] - a[1])
        .map(([tag, min]) => {
          const pct = total ? ((min / total) * 100).toFixed(1) : 0;
          // 平均：四舍五入到分钟；不足 1 分钟显示为 "<1 分钟"
          const shownMin = Math.round(min / divisor);
          const shownStr = shownMin === 0 && min > 0 ? '< 1 分钟' : fmtDuration(shownMin);
          return `
            <div class="stat-item">
              <div class="stat-row">
                <div class="stat-name">${escapeHTML(tag)}</div>
                <div class="stat-meta">${shownStr}${unitText} · ${pct}%</div>
              </div>
              <div class="stat-bar">
                <div class="stat-bar-fill" style="width:${pct}%"></div>
              </div>
            </div>
          `;
        }).join('');
      const totalShown = Math.round(total / divisor);
      const totalStr = totalShown === 0 && total > 0 ? '< 1 分钟' : fmtDuration(totalShown);
      container.innerHTML = items + `
        <div class="total">
          <span>${totalLabel}</span>
          <span>${totalStr}${unitText}（${records.length} 条）</span>
        </div>
      `;
    }

    /** 工具：相对今天的"自然语言"描述（昨天 / 今天 / 明天 / N 天前 / N 天后） */
    function relativeDayText(dateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      const target = new Date(dateStr); target.setHours(0,0,0,0);
      const diff = Math.round((target - today) / 86400000);
      if (diff === 0) return '今天';
      if (diff === -1) return '昨天';
      if (diff === 1) return '明天';
      if (diff < 0) return `${-diff} 天前`;
      return `${diff} 天后`;
    }

    /** 工具：相对本周的描述（本周 / 上周 / N 周前 / 下周 / N 周后） */
    function relativeWeekText(weekStartStr) {
      const thisMon = new Date(getMondayStr(new Date()));
      const target = new Date(weekStartStr);
      const diffWeeks = Math.round((target - thisMon) / (86400000 * 7));
      if (diffWeeks === 0) return '本周';
      if (diffWeeks === -1) return '上周';
      if (diffWeeks === 1) return '下周';
      if (diffWeeks < 0) return `${-diffWeeks} 周前`;
      return `${diffWeeks} 周后`;
    }

    // ---------- 渲染：每日统计（按 state.statsDate） ----------
    function renderDailyStats() {
      const date = state.statsDate;
      // 更新导航条文字
      document.getElementById('dayLabel').textContent = date;
      document.getElementById('daySub').textContent = relativeDayText(date);
      // 「今天」按钮：已在今天则禁用
      document.getElementById('dayToday').disabled = (date === fmtDate(new Date()));

      const list = state.records.filter(r => r.date === date);
      renderStatsInto(
        document.getElementById('dailyStats'),
        list,
        date + ' 共记录',
        '这一天还没有记录'
      );
    }

    // ---------- 渲染：周统计（按 state.statsWeekStart） ----------
    function renderWeeklyStats() {
      const startStr = state.statsWeekStart;
      // 由 startStr 推导出 endStr（周一+6天）
      const startD = new Date(startStr);
      const endD = new Date(startD);
      endD.setDate(startD.getDate() + 6);
      const endStr = fmtDate(endD);

      // 更新导航条文字
      document.getElementById('weekLabel').textContent = `${startStr} ~ ${endStr}`;
      document.getElementById('weekSub').textContent = relativeWeekText(startStr) + '（周一至周日）';
      // 「本周」按钮：已在本周则禁用
      document.getElementById('weekThis').disabled = (startStr === getMondayStr(new Date()));

      const inRange = state.records.filter(r => r.date >= startStr && r.date <= endStr);
      const isAvg = state.weeklyMode === 'avg';
      renderStatsInto(
        document.getElementById('weeklyStats'),
        inRange,
        isAvg ? '该周日均' : '该周共记录',
        '这一周还没有记录',
        // 平均模式：除以 7（一周固定 7 天，更符合"日均"的常规口径）
        isAvg ? { divisor: 7, unitText: ' / 天' } : undefined
      );
      // 同步分段开关的高亮状态
      document.querySelectorAll('#weekMode button').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === state.weeklyMode);
      });
    }

    // ---------- 渲染：历史（紧凑文本式列表，截图友好） ----------
    // 关键：默认不渲染按钮，开关打开后按钮内联在同一行；不依赖 hover，无布局抖动
    function renderHistory() {
      const date = state.historyDate;
      document.getElementById('historyDate').value = date;

      const list = state.records
        .filter(r => r.date === date)
        .sort((a, b) => timeToMin(a.start) - timeToMin(b.start));

      const container = document.getElementById('historyTimeline');
      if (list.length === 0) {
        container.innerHTML = '<div class="empty">这一天没有记录</div>';
        return;
      }

      const showOps = state.showHistoryOps;
      const showEvent = state.showEvent;
      const showTag = state.showTag;
      let total = 0;
      const rows = list.map(r => {
        const dur = durationOf(r);
        total += dur;
        // 编辑模式 ON 时，按钮内联在第三列（与时长并排，不换行）
        const opsHTML = showOps ? `
          <span class="ops">
            <button data-action="edit"   title="编辑">✎</button>
            <button class="danger" data-action="delete" title="删除">✕</button>
          </span>` : '';
        // 事件名 / 标签 可分别显隐；都隐藏时显示 '—' 占位避免行塌陷
        const evHTML = showEvent ? escapeHTML(r.event) : '';
        const tagHTML = showTag ? `<span class="tagref">[${escapeHTML(r.tag)}]</span>` : '';
        const sep = (showEvent && showTag) ? ' ' : '';
        const middle = (showEvent || showTag) ? `${evHTML}${sep}${tagHTML}` : '<span style="color:#bbb">—</span>';
        return `
          <div class="compact-row" data-id="${r.id}">
            <span class="t">${r.start}–${r.end}</span>
            <span class="n">${middle}</span>
            <span class="r">
              <span class="t">${fmtDuration(dur)}</span>
              ${opsHTML}
            </span>
          </div>
        `;
      }).join('');

      container.innerHTML = `
        <div class="compact-list">${rows}</div>
        <div class="compact-summary">
          <span>共 ${list.length} 条</span>
          <span>合计 ${fmtDuration(total)}</span>
        </div>
      `;

      // 仅当开关打开时才绑定（按钮存在才需要）
      if (showOps) {
        container.querySelectorAll('.compact-row').forEach(el => {
          const id = el.dataset.id;
          const editBtn = el.querySelector('[data-action="edit"]');
          const delBtn = el.querySelector('[data-action="delete"]');
          if (editBtn) editBtn.onclick = () => openEditModal(id);
          if (delBtn) delBtn.onclick = () => {
            if (confirm('确定要删除这条记录吗？')) {
              state.records = state.records.filter(r => r.id !== id);
              saveRecords(state.records);
              refreshAll();
              toast('已删除');
            }
          };
        });
      }
    }

    // ---------- 渲染：标签管理（含 ↑↓ 排序按钮） ----------
    function renderTags() {
      const list = document.getElementById('tagList');
      if (state.tags.length === 0) {
        list.innerHTML = '<div class="empty">还没有标签，添加一个吧</div>';
        return;
      }
      list.innerHTML = state.tags.map((t, i) => `
        <div class="tag-row" data-index="${i}">
          <span class="name">${escapeHTML(t)}</span>
          <div class="ops">
            <button data-action="up"   title="上移" ${i === 0 ? 'disabled' : ''}>↑</button>
            <button data-action="down" title="下移" ${i === state.tags.length - 1 ? 'disabled' : ''}>↓</button>
            <button data-action="del"  title="删除" class="danger">✕</button>
          </div>
        </div>
      `).join('');

      list.querySelectorAll('.tag-row').forEach(row => {
        const idx = Number(row.dataset.index);
        row.querySelector('[data-action="up"]').onclick   = () => moveTag(idx, -1);
        row.querySelector('[data-action="down"]').onclick = () => moveTag(idx,  1);
        row.querySelector('[data-action="del"]').onclick  = () => removeTag(idx);
      });
    }

    /** 将第 idx 个标签向 dir(-1上 / +1下) 移动一位 */
    function moveTag(idx, dir) {
      const j = idx + dir;
      if (j < 0 || j >= state.tags.length) return;
      const arr = state.tags.slice();
      [arr[idx], arr[j]] = [arr[j], arr[idx]];
      state.tags = arr;
      saveTags(state.tags);
      refreshAll();
    }

    /** 删除第 idx 个标签 */
    function removeTag(idx) {
      if (state.tags.length === 1) { toast('至少保留一个标签'); return; }
      const t = state.tags[idx];
      if (confirm(`删除标签"${t}"？已有记录不会被删除。`)) {
        state.tags = state.tags.filter((_, i) => i !== idx);
        saveTags(state.tags);
        refreshAll();
      }
    }

    // ---------- 一次性刷新所有页面 ----------
    function refreshAll() {
      renderTagSelect(document.getElementById('inputTag'));
      renderTodayList();
      renderDailyStats();
      renderWeeklyStats();
      renderHistory();
      renderTags();
    }

    // ---------- 添加新记录 ----------
    function addRecord() {
      const date = document.getElementById('inputDate').value;
      const start = document.getElementById('inputStart').value;
      const end = document.getElementById('inputEnd').value;
      const event = document.getElementById('inputEvent').value.trim();
      const tag = document.getElementById('inputTag').value;

      if (!date) { toast('请选择日期'); return; }
      if (!start || !end) { toast('请填写开始和结束时间'); return; }
      if (!event) { toast('请填写事件名称'); return; }
      if (!tag) { toast('请选择分类标签'); return; }
      // 简单校验：起止相同视为无效
      if (start === end) { toast('开始时间和结束时间不能相同'); return; }

      const rec = { id: uid(), date, start, end, event, tag };
      state.records.push(rec);
      saveRecords(state.records);

      // 清空事件输入，方便快速记下一条
      document.getElementById('inputEvent').value = '';
      // 自动把上一条结束时间作为下一条的开始时间，加快连续记录
      document.getElementById('inputStart').value = end;
      document.getElementById('inputEnd').value = '';
      // 日期保留不变（方便连续补录同一天的记录）

      refreshAll();
      // 如果补录的不是今天，提示一下
      const today = fmtDate(new Date());
      toast(date === today ? '已保存 ✓' : `已补录到 ${date} ✓`);
    }

    // ---------- 编辑记录：模态框 ----------
    function openEditModal(id) {
      const rec = state.records.find(r => r.id === id);
      if (!rec) return;
      state.editingId = id;
      document.getElementById('editDate').value = rec.date;
      document.getElementById('editStart').value = rec.start;
      document.getElementById('editEnd').value = rec.end;
      document.getElementById('editEvent').value = rec.event;
      renderTagSelect(document.getElementById('editTag'), rec.tag);
      document.getElementById('editModal').classList.add('active');
    }
    function closeEditModal() {
      state.editingId = null;
      document.getElementById('editModal').classList.remove('active');
    }
    function saveEdit() {
      const id = state.editingId;
      if (!id) return;
      const date = document.getElementById('editDate').value;
      const start = document.getElementById('editStart').value;
      const end = document.getElementById('editEnd').value;
      const event = document.getElementById('editEvent').value.trim();
      const tag = document.getElementById('editTag').value;
      if (!date || !start || !end || !event || !tag) { toast('请填写完整'); return; }
      if (start === end) { toast('时间不能相同'); return; }
      const idx = state.records.findIndex(r => r.id === id);
      if (idx >= 0) {
        state.records[idx] = { ...state.records[idx], date, start, end, event, tag };
        saveRecords(state.records);
        closeEditModal();
        refreshAll();
        toast('已更新 ✓');
      }
    }

    // ---------- 添加标签 ----------
    function addTag() {
      const v = document.getElementById('newTagInput').value.trim();
      if (!v) return;
      if (state.tags.includes(v)) { toast('标签已存在'); return; }
      state.tags.push(v);
      saveTags(state.tags);
      document.getElementById('newTagInput').value = '';
      refreshAll();
    }

    // ---------- 统计页：日期 / 周次 偏移工具 ----------
    /** 把日统计的目标日期向前/后挪 n 天 */
    function shiftStatsDate(n) {
      const d = new Date(state.statsDate);
      d.setDate(d.getDate() + n);
      state.statsDate = fmtDate(d);
      renderDailyStats();
    }
    /** 把周统计的目标周次向前/后挪 n 周 */
    function shiftStatsWeek(n) {
      const d = new Date(state.statsWeekStart);
      d.setDate(d.getDate() + n * 7);
      state.statsWeekStart = fmtDate(d);
      renderWeeklyStats();
    }

    // ---------- 数据导出 / 导入（备份） ----------
    /** 导出全部数据为 JSON 文件 */
    function exportData() {
      const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        records: state.records,
        tags: state.tags,
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = fmtDate(new Date()) + '_' + fmtTime(new Date()).replace(':', '');
      a.href = url;
      a.download = `时间日志_备份_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('已导出 ✓');
    }

    /** 触发文件选择 */
    function triggerImport() {
      document.getElementById('fileImport').click();
    }

    /** 处理用户选中的导入文件 */
    function handleImportFile(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data || !Array.isArray(data.records) || !Array.isArray(data.tags)) {
            throw new Error('文件格式不正确');
          }
          if (!confirm(`将导入 ${data.records.length} 条记录、${data.tags.length} 个标签，并覆盖现有数据。是否继续？`)) {
            e.target.value = '';
            return;
          }
          state.records = data.records;
          state.tags = data.tags;
          saveRecords(state.records);
          saveTags(state.tags);
          refreshAll();
          toast('导入成功 ✓');
        } catch (err) {
          alert('导入失败：' + err.message);
        } finally {
          e.target.value = ''; // 允许重复选同一个文件
        }
      };
      reader.readAsText(file);
    }

    // ---------- 切换页面 ----------
    function switchPage(name) {
      state.currentPage = name;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.page === name));

      // 顶部标题
      const titles = { record: '今日记录', stats: '数据统计', history: '历史回看', tags: '标签管理' };
      document.getElementById('pageTitle').textContent = titles[name];
      document.getElementById('headerAction').style.display = 'none';
    }

    // ---------- 初始化 ----------
    function init() {
      // 默认日期 = 今天
      const now = new Date();
      document.getElementById('inputDate').value = fmtDate(now);
      // 默认开始时间 = 当前小时:00（结束留空）
      const hh = String(now.getHours()).padStart(2, '0');
      document.getElementById('inputStart').value = `${hh}:00`;

      // 历史页默认今天
      document.getElementById('historyDate').value = fmtDate(now);

      // 绑定事件
      document.getElementById('btnAdd').onclick = addRecord;
      document.getElementById('btnAddTag').onclick = addTag;
      document.getElementById('newTagInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addTag();
      });
      document.getElementById('historyDate').onchange = e => {
        state.historyDate = e.target.value;
        renderHistory();
      };
      document.getElementById('btnToday').onclick = () => {
        state.historyDate = fmtDate(new Date());
        renderHistory();
      };
      // 历史页：三个显示开关
      document.getElementById('chkShowOps').onchange = e => {
        state.showHistoryOps = e.target.checked;
        renderHistory();
      };
      document.getElementById('chkShowEvent').onchange = e => {
        state.showEvent = e.target.checked;
        renderHistory();
      };
      document.getElementById('chkShowTag').onchange = e => {
        state.showTag = e.target.checked;
        renderHistory();
      };

      // 编辑记录模态框
      document.getElementById('btnEditCancel').onclick = closeEditModal;
      document.getElementById('btnEditSave').onclick = saveEdit;
      document.getElementById('editModal').addEventListener('click', e => {
        if (e.target.id === 'editModal') closeEditModal();
      });

      // 数据导入导出
      document.getElementById('btnExport').onclick = exportData;
      document.getElementById('btnImport').onclick = triggerImport;
      document.getElementById('fileImport').onchange = handleImportFile;

      // 统计页：日期左右切换
      document.getElementById('dayPrev').onclick = () => shiftStatsDate(-1);
      document.getElementById('dayNext').onclick = () => shiftStatsDate(1);
      document.getElementById('dayToday').onclick = () => {
        state.statsDate = fmtDate(new Date());
        renderDailyStats();
      };
      // 统计页：周次左右切换
      document.getElementById('weekPrev').onclick = () => shiftStatsWeek(-1);
      document.getElementById('weekNext').onclick = () => shiftStatsWeek(1);
      document.getElementById('weekThis').onclick = () => {
        state.statsWeekStart = getMondayStr(new Date());
        renderWeeklyStats();
      };
      // 周汇总：显示模式切换（总时长 / 每日平均）
      document.querySelectorAll('#weekMode button').forEach(b => {
        b.onclick = () => {
          state.weeklyMode = b.dataset.mode;
          renderWeeklyStats();
        };
      });

      // Tab 切换
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => switchPage(btn.dataset.page);
      });

      refreshAll();
    }

    // 等 DOM 就绪
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
